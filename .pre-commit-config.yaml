repos:
  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        language: node
        entry: npm run lint
        pass_filenames: false
        types_or: [ts, tsx, javascript]

      - id: tsc
        name: TypeScript check
        language: system
        entry: npx tsc --noEmit
        pass_filenames: false
        types_or: [ts, tsx]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
